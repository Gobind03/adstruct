version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: ms-postgres
    environment:
      POSTGRES_DB: marketsuite
      POSTGRES_USER: marketsuite
      POSTGRES_PASSWORD: marketsuite
    ports:
      - "${PG_HOST_PORT:-5433}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U marketsuite"]
      interval: 10s
      timeout: 5s
      retries: 5

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: ms-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@avyukt.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      - postgres
    volumes:
      - pgadmin_data:/var/lib/pgadmin
      - ./pgadmin/servers.json:/pgadmin4/servers.json:ro

  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: ms-backend
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: marketsuite
      DB_USER: marketsuite
      DB_PASS: marketsuite
      SPRING_PROFILES_ACTIVE: dev
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
    profiles:
      - full

  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    container_name: ms-frontend
    ports:
      - "4200:80"
    depends_on:
      - backend
    profiles:
      - full

volumes:
  pgdata:
  pgadmin_data:
