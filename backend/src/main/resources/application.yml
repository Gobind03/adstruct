server:
  port: 8080

spring:
  application:
    name: market-suite
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5433}/${DB_NAME:marketsuite}
    username: ${DB_USER:marketsuite}
    password: ${DB_PASS:marketsuite}
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: false
  flyway:
    enabled: true
    locations: classpath:db/migration

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui

app:
  jwt:
    secret: ${JWT_SECRET:af7c1fe6-d669-414e-b066-e9733f0de7a8-change-me-in-production-256bit}
    expiration-ms: 3600000
    refresh-expiration-ms: 86400000
  encryption:
    key: ${ENCRYPTION_KEY:0123456789abcdef0123456789abcdef}
  seed-data:
    enabled: false
  ai:
    enable-custom-http: ${AI_ENABLE_HTTP_CALLS:false}
    default-provider: MOCK
    max-conversation-messages: 50

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: when_authorized

logging:
  pattern:
    level: "%5p [${spring.application.name},%X{correlationId}]"
